<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shengji (升级)</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & base                                                         */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Courier New", Courier, monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: 1px solid #555;
      background: #2a2a4a;
      color: #e0e0e0;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 14px;
    }
    button:hover:not(:disabled) { background: #3a3a6a; border-color: #888; }
    button:disabled { opacity: 0.4; cursor: default; }

    input[type="text"], input[type="text"]:focus {
      font-family: inherit;
      font-size: 14px;
      background: #111130;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 8px 12px;
      outline: none;
      width: 100%;
    }
    input[type="text"]:focus { border-color: #8888ff; }

    .hidden { display: none !important; }

    /* ------------------------------------------------------------------ */
    /* Top bar (shared by lobby + game screens)                             */
    /* ------------------------------------------------------------------ */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111130;
      padding: 8px 20px;
      border-bottom: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .top-bar .room-code {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #aaaaff;
      cursor: pointer;
      user-select: all;
    }
    .top-bar .trump-info {
      font-size: 14px;
      color: #ffcc44;
    }

    /* ------------------------------------------------------------------ */
    /* Screen: Landing                                                      */
    /* ------------------------------------------------------------------ */
    #screen-landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 32px;
      padding: 24px;
    }

    #screen-landing h1 {
      font-size: 42px;
      color: #aaaaff;
      letter-spacing: 4px;
    }

    .landing-card {
      background: #111130;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 24px 32px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .landing-card h2 {
      font-size: 18px;
      color: #aaaaff;
      margin-bottom: 4px;
    }
    .landing-card button { width: 100%; }

    #landing-error {
      color: #ff6666;
      font-size: 13px;
      min-height: 20px;
      text-align: center;
    }

    /* ------------------------------------------------------------------ */
    /* Screen: Lobby                                                        */
    /* ------------------------------------------------------------------ */
    #screen-lobby { display: none; flex-direction: column; min-height: 100vh; }

    .lobby-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 32px 24px;
    }

    #player-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 300px;
    }
    .player-entry {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #111130;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 15px;
    }
    .player-entry .badge {
      font-size: 11px;
      background: #aaaaff;
      color: #111130;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: bold;
    }
    .player-slot {
      background: #0d0d22;
      border: 1px dashed #333;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 13px;
      color: #555;
      font-style: italic;
    }

    #lobby-status {
      font-size: 14px;
      color: #888;
      text-align: center;
    }

    #mode-selector {
      display: flex;
      gap: 12px;
    }
    #mode-selector button {
      font-size: 15px;
      padding: 10px 20px;
    }
    #mode-selector button.active {
      background: #3a3a8a;
      border-color: #8888ff;
      color: #ffffff;
    }

    #superuser-section {
      border: 1px dashed #444;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: #0d0d22;
      width: 300px;
    }
    #superuser-confirm {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    /* ------------------------------------------------------------------ */
    /* Screen: Game                                                         */
    /* ------------------------------------------------------------------ */
    #screen-game { display: none; flex-direction: column; min-height: 100vh; }

    .game-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      flex: 1;
    }

    /* Trick area — 3×3 grid with player positions at top/left/right/bottom */
    #trick-area {
      display: grid;
      grid-template-areas:
        ".    top   ."
        "left mid  right"
        ".    bot   .";
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 8px;
      width: 100%;
      max-width: 600px;
      background: #0d1a0d;
      border: 1px solid #2a4a2a;
      border-radius: 10px;
      padding: 12px;
    }

    .player-pos {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .player-pos.pos-top    { grid-area: top; }
    .player-pos.pos-left   { grid-area: left; align-items: flex-end; }
    .player-pos.pos-right  { grid-area: right; align-items: flex-start; }
    .player-pos.pos-bottom { grid-area: bot; }
    .pos-mid               { grid-area: mid; display: flex; align-items: center; justify-content: center; }

    .player-name-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .player-name-label.is-turn {
      color: #ffcc44;
      font-weight: bold;
    }
    .player-name-label.is-leader {
      color: #aaaaff;
    }

    .trick-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      justify-content: center;
    }

    /* Points display */
    #points-display {
      display: flex;
      gap: 32px;
      font-size: 14px;
      color: #ccc;
      background: #111130;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 8px 20px;
    }
    #points-display span.label { color: #888; }
    #points-display span.value { color: #ffcc44; font-weight: bold; }

    /* Round / trick info */
    #round-info {
      font-size: 12px;
      color: #555;
    }

    /* ------------------------------------------------------------------ */
    /* Card element                                                         */
    /* ------------------------------------------------------------------ */
    .card {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 56px;
      border: 1px solid #555;
      border-radius: 5px;
      background: #f8f4e8;
      color: #111;
      font-size: 13px;
      font-weight: bold;
      line-height: 1.1;
      cursor: default;
      user-select: none;
      transition: transform 0.1s ease;
      white-space: nowrap;
      padding: 2px;
    }
    .card .card-rank { font-size: 14px; }
    .card .card-suit { font-size: 18px; line-height: 1; }
    .card.suit-hearts   { color: #cc0000; }
    .card.suit-diamonds { color: #cc0000; }
    .card.suit-spades   { color: #111111; }
    .card.suit-clubs    { color: #111111; }
    .card.suit-joker    { color: #6600aa; background: #f0e8ff; }

    /* Selectable cards in hand */
    .card.selectable {
      cursor: pointer;
      border: 1px solid #888;
    }
    .card.selectable:hover { border-color: #aaaaff; }
    .card.selected {
      transform: translateY(-12px);
      border: 2px solid #8888ff;
      background: #e8e8ff;
    }
    .card.selected.suit-hearts   { color: #cc0000; }
    .card.selected.suit-diamonds { color: #cc0000; }

    /* ------------------------------------------------------------------ */
    /* Hand area                                                            */
    /* ------------------------------------------------------------------ */
    #hand-area {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      padding: 20px 8px 8px;  /* extra top padding for selected card overflow */
      width: 100%;
      max-width: 700px;
      min-height: 80px;
    }

    /* ------------------------------------------------------------------ */
    /* Action area                                                          */
    /* ------------------------------------------------------------------ */
    #action-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 600px;
      background: #111130;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 14px;
    }

    .action-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

    #current-bid-display {
      font-size: 13px;
      color: #aaa;
      text-align: center;
    }
    #current-bid-display strong { color: #ffcc44; }

    .bid-btn-suit {
      font-size: 20px;
      width: 50px;
      padding: 8px 0;
    }
    .bid-btn-suit.suit-hearts, .bid-btn-suit.suit-diamonds { color: #ff6666; }
    .bid-btn-suit.suit-spades, .bid-btn-suit.suit-clubs   { color: #ccccff; }

    /* Pass button — pressed state */
    button.btn-passed {
      background: #1a3a1a;
      border-color: #44aa44;
      color: #88dd88;
      opacity: 1;   /* override the disabled opacity so the checkmark stays visible */
      cursor: default;
    }

    #play-validation-msg {
      font-size: 13px;
      color: #ff8866;
      min-height: 18px;
      text-align: center;
    }
    #play-validation-msg.valid { color: #66ff88; }

    /* Friend declaration panel */
    #friend-decl-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      width: 100%;
    }
    #friend-decl-panel select {
      font-family: inherit;
      background: #111130;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 14px;
    }
    .friend-decl-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }

    /* ------------------------------------------------------------------ */
    /* Error / notification bar                                             */
    /* ------------------------------------------------------------------ */
    #game-error {
      color: #ff6666;
      font-size: 13px;
      min-height: 18px;
      text-align: center;
      width: 100%;
    }

    /* ------------------------------------------------------------------ */
    /* Overlay (round over, game over, game aborted)                        */
    /* ------------------------------------------------------------------ */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #overlay.hidden { display: none; }

    #overlay-box {
      background: #111130;
      border: 1px solid #555;
      border-radius: 12px;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 400px;
      text-align: center;
    }
    #overlay-box h2 { font-size: 24px; color: #aaaaff; }
    #overlay-box p  { font-size: 15px; color: #ccc; line-height: 1.5; }
    #overlay-box button { font-size: 15px; padding: 10px 24px; }

    /* ------------------------------------------------------------------ */
    /* Miscellaneous                                                        */
    /* ------------------------------------------------------------------ */
    .dealer-tag {
      font-size: 10px;
      background: #5555aa;
      color: #ffffff;
      padding: 1px 6px;
      border-radius: 8px;
    }

    .defending-tag {
      font-size: 10px;
      background: #225522;
      color: #88ff88;
      padding: 1px 6px;
      border-radius: 8px;
    }

    #hand-header {
      font-size: 12px;
      color: #666;
      text-align: center;
    }

    .label-area {
      font-size: 12px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- ================================================================== -->
<!-- Screen 1: Landing                                                    -->
<!-- ================================================================== -->
<div id="screen-landing">
  <h1>Shengji (升级)</h1>

  <div class="landing-card">
    <h2>Create Room</h2>
    <input type="text" id="create-name" placeholder="Your name" maxlength="20" />
    <button id="create-btn">Create Room</button>
  </div>

  <div class="landing-card">
    <h2>Join Room</h2>
    <input type="text" id="join-code" placeholder="Room code (e.g. ABC123)" maxlength="6" style="text-transform:uppercase"/>
    <input type="text" id="join-name" placeholder="Your name" maxlength="20" />
    <button id="join-btn">Join Room</button>
  </div>

  <div id="landing-error"></div>
</div>

<!-- ================================================================== -->
<!-- Screen 2: Lobby                                                      -->
<!-- ================================================================== -->
<div id="screen-lobby">
  <div class="top-bar">
    <span class="room-code" id="lobby-room-code" title="Click to copy">ROOM CODE: ------</span>
    <span class="trump-info" id="lobby-trump-info">Currently at Rank 2</span>
  </div>

  <div class="lobby-body">
    <div id="player-list"></div>

    <div id="lobby-status">Waiting for players...</div>

    <!-- Mode selector — only shown to game master -->
    <div id="mode-selector" class="hidden">
      <button id="btn-upgrade">Upgrade (升级)</button>
      <button id="btn-find-friends">Find Friends (找朋友)</button>
    </div>

    <!-- Superuser section — only shown to game master -->
    <div id="superuser-section" class="hidden">
      <button id="btn-superuser-enable">Enable Superuser Mode?</button>
      <div id="superuser-confirm" class="hidden">
        <span>Are you sure?</span>
        <button id="btn-superuser-yes">Yes, Enable</button>
        <button id="btn-superuser-cancel">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- ================================================================== -->
<!-- Screen 3: Game                                                       -->
<!-- ================================================================== -->
<div id="screen-game">
  <div class="top-bar">
    <span class="room-code" id="game-room-code" title="Click to copy">ROOM CODE: ------</span>
    <span class="trump-info" id="game-trump-info">—</span>
  </div>

  <div class="game-body">
    <!-- Round / trick counter -->
    <div id="round-info">Round 1</div>

    <!-- Trick area: top/left/right/bottom player positions -->
    <div id="trick-area">
      <div class="player-pos pos-top"   id="pos-top">
        <div class="player-name-label" id="name-top">—</div>
        <div class="trick-cards"       id="cards-top"></div>
      </div>
      <div class="player-pos pos-left"  id="pos-left">
        <div class="player-name-label" id="name-left">—</div>
        <div class="trick-cards"       id="cards-left"></div>
      </div>
      <div class="pos-mid">
        <div id="trick-status" class="label-area"></div>
      </div>
      <div class="player-pos pos-right" id="pos-right">
        <div class="player-name-label" id="name-right">—</div>
        <div class="trick-cards"       id="cards-right"></div>
      </div>
      <div class="player-pos pos-bottom" id="pos-bottom">
        <div class="player-name-label" id="name-bottom">—</div>
        <div class="trick-cards"       id="cards-bottom"></div>
      </div>
    </div>

    <!-- Points -->
    <div id="points-display">
      <div>
        <span class="label">Attacking: </span>
        <span class="value" id="pts-attacking">0</span>
        <span class="label"> pts</span>
      </div>
      <div>
        <span class="label">Defending: </span>
        <span class="value" id="pts-defending">—</span>
        <span class="label"> pts needed</span>
      </div>
    </div>

    <!-- Player's own hand -->
    <div id="hand-header"></div>
    <div id="hand-area"></div>

    <!-- Context-sensitive action area -->
    <div id="action-area"></div>

    <!-- Error / validation messages -->
    <div id="game-error"></div>
  </div>
</div>

<!-- ================================================================== -->
<!-- Overlay (round over / game over / aborted)                           -->
<!-- ================================================================== -->
<div id="overlay" class="hidden">
  <div id="overlay-box">
    <h2 id="overlay-title">—</h2>
    <p  id="overlay-body">—</p>
    <button id="overlay-btn" class="hidden">OK</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
